const STORAGE_KEY = "sofia_checklist_v2";
function loadState() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } }
function saveState(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
let state = loadState();
function subKey(tid, si) { return `${tid}_s${si}`; }
function isSubChecked(tid, si) { return !!state[subKey(tid, si)]; }
function toggleSub(tid, si) { state[subKey(tid, si)] = !state[subKey(tid, si)]; saveState(state); render(); }
function toggleAllSubs(tid, subs) { const all = subs.every((_, i) => isSubChecked(tid, i)); subs.forEach((_, i) => { state[subKey(tid, i)] = !all; }); saveState(state); render(); }
function getTaskProgress(t) { const d = t.subs.filter((_, i) => isSubChecked(t.id, i)).length; return { done: d, total: t.subs.length }; }
function getPhaseProgress(p) { let d = 0, t = 0; p.tasks.forEach(tk => { const pp = getTaskProgress(tk); d += pp.done; t += pp.total; }); return { done: d, total: t }; }
function getGlobalProgress() { let d = 0, t = 0; DATA.forEach(p => { const pp = getPhaseProgress(p); d += pp.done; t += pp.total; }); return { done: d, total: t }; }
const openPhases = new Set(), expandedTasks = new Set();
function togglePhase(pid) { if (openPhases.has(pid)) openPhases.delete(pid); else openPhases.add(pid); render(); }
function toggleTaskExpand(tid) { if (expandedTasks.has(tid)) expandedTasks.delete(tid); else expandedTasks.add(tid); render(); }
function expandAll() { DATA.forEach(p => { openPhases.add(p.id); p.tasks.forEach(t => expandedTasks.add(t.id)); }); render(); }
function collapseAll() { openPhases.clear(); expandedTasks.clear(); render(); }
function resetAll() { if (!confirm("Seguro que queres resetear todo el progreso?")) return; state = {}; saveState(state); render(); }
function exportData() { const b = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" }); const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = "sofia_checklist_v2_progreso.json"; a.click(); }
function importData() { const i = document.createElement("input"); i.type = "file"; i.accept = ".json"; i.onchange = e => { const r = new FileReader(); r.onload = ev => { try { state = JSON.parse(ev.target.result); saveState(state); render(); } catch { alert("Archivo invalido"); } }; r.readAsText(e.target.files[0]); }; i.click(); }
let searchTerm = "";
document.getElementById("search").addEventListener("input", e => { searchTerm = e.target.value.toLowerCase(); render(); });
function checkIcon() { return '<svg class="check-icon" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 6l3 3 5-5"/></svg>'; }
function minusIcon() { return '<svg class="minus-icon" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 6h8"/></svg>'; }
function chevronSvg() { return '<svg class="phase-chevron" viewBox="0 0 20 20" fill="currentColor"><path d="M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z"/></svg>'; }
function highlight(text) { if (!searchTerm) return text; const re = new RegExp(`(${searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'); return text.replace(re, '<mark style="background:#8b5cf640;color:#e1e4e8;border-radius:2px;padding:0 2px">$1</mark>'); }
function render() {
  const container = document.getElementById("phases");
  const gp = getGlobalProgress();
  document.getElementById("global-done").textContent = gp.done;
  document.getElementById("global-total").textContent = gp.total;
  const gPct = gp.total ? Math.round(gp.done / gp.total * 100) : 0;
  document.getElementById("global-pct").textContent = gPct + "%";
  document.getElementById("global-bar").style.width = gPct + "%";
  let html = "";
  DATA.forEach(phase => {
    const pp = getPhaseProgress(phase);
    const pPct = pp.total ? Math.round(pp.done / pp.total * 100) : 0;
    const isOpen = openPhases.has(phase.id);
    const isComplete = pp.done === pp.total;
    const matchingTasks = searchTerm ? phase.tasks.filter(t => t.label.toLowerCase().includes(searchTerm) || t.subs.some(s => s.toLowerCase().includes(searchTerm))) : phase.tasks;
    if (searchTerm && matchingTasks.length === 0) return;
    const forceOpen = searchTerm && matchingTasks.length > 0;
    html += `<div class="phase ${isOpen || forceOpen ? 'open' : ''} ${isComplete ? 'phase-complete' : ''}">`;
    html += `<div class="phase-header" onclick="togglePhase('${phase.id}')">${chevronSvg()}<div class="phase-number">${phase.phase}</div><div class="phase-info"><div class="phase-title">${phase.title}</div><div class="phase-subtitle">${phase.subtitle}</div></div><div class="phase-progress"><div class="phase-progress-bar"><div class="phase-progress-fill" style="width:${pPct}%"></div></div><div class="phase-progress-text">${pp.done}/${pp.total}</div></div></div>`;
    html += `<div class="phase-body">`;
    matchingTasks.forEach(task => {
      const tp = getTaskProgress(task);
      const allDone = tp.done === tp.total;
      const someDone = tp.done > 0 && !allDone;
      const isExpanded = expandedTasks.has(task.id) || !!searchTerm;
      html += `<div class="task-group ${isExpanded ? 'expanded' : ''}"><div class="task-parent ${allDone ? 'done' : ''}" onclick="toggleAllSubs('${task.id}', ${JSON.stringify(task.subs).replace(/"/g, '&quot;')})"><div class="task-checkbox ${allDone ? 'checked' : someDone ? 'partial' : ''}">${checkIcon()}${minusIcon()}</div><span class="task-code">${task.id}</span><span class="task-label">${highlight(task.label)}</span><span class="task-count">${tp.done}/${tp.total}</span></div>`;
      html += `<button class="expand-btn" onclick="event.stopPropagation();toggleTaskExpand('${task.id}')">${isExpanded ? 'Ocultar detalle' : 'Ver detalle (' + task.subs.length + ')'}</button>`;
      html += `<div class="subtasks">`;
      task.subs.forEach((sub, i) => {
        const checked = isSubChecked(task.id, i);
        if (searchTerm && !sub.toLowerCase().includes(searchTerm) && !task.label.toLowerCase().includes(searchTerm)) return;
        html += `<div class="subtask ${checked ? 'done' : ''}" onclick="toggleSub('${task.id}', ${i})"><div class="subtask-checkbox ${checked ? 'checked' : ''}">${checkIcon()}</div><span class="subtask-label">${highlight(sub)}</span></div>`;
      });
      html += `</div></div>`;
    });
    html += `</div></div>`;
  });
  container.innerHTML = html;
}
render();
</script>
